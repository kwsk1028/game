<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Space Fighter Pro</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
color:white;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

#hpbar{
width:200px;
height:12px;
background:#333;
margin-top:5px;
}

#hp{
height:12px;
background:#0f0;
}

</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span>
<div id="hpbar"><div id="hp"></div></div>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let score=0
let maxHP=100
let hp=100

let player={
x:canvas.width/2,
y:canvas.height-120
}

let bullets=[]
let enemies=[]
let particles=[]
let stars=[]
let items=[]

// 星
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*2
})
}

// プレイヤー移動
function move(x,y){
player.x=x
player.y=y
}

window.addEventListener("mousemove",e=>{
move(e.clientX,e.clientY)
})

window.addEventListener("touchmove",e=>{
move(e.touches[0].clientX,e.touches[0].clientY)
})

// 弾
setInterval(()=>{

bullets.push({
x:player.x,
y:player.y
})

},180)

// 敵
setInterval(()=>{

enemies.push({
x:Math.random()*canvas.width,
y:-20,
speed:2+Math.random()*2
})

},700)

// アイテム
setInterval(()=>{

items.push({
x:Math.random()*canvas.width,
y:-20
})

},6000)

// 爆発
function explode(x,y){

for(let i=0;i<20;i++){

particles.push({
x:x,
y:y,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
life:40
})

}

}

// 更新
function update(){

// 星
stars.forEach(s=>{
s.y+=1
if(s.y>canvas.height)s.y=0
})

// 弾
bullets.forEach((b,i)=>{
b.y-=10
if(b.y<0)bullets.splice(i,1)
})

// 敵
enemies.forEach((e,i)=>{

e.y+=e.speed

if(e.y>canvas.height){
enemies.splice(i,1)
hp-=10
}

})

// アイテム
items.forEach((it,i)=>{

it.y+=3

if(Math.abs(it.x-player.x)<30 && Math.abs(it.y-player.y)<30){
items.splice(i,1)
hp=Math.min(maxHP,hp+20)
}

})

// 弾衝突
bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.abs(b.x-e.x)<25 && Math.abs(b.y-e.y)<25){

explode(e.x,e.y)

bullets.splice(bi,1)
enemies.splice(ei,1)

score+=10
document.getElementById("score").textContent=score

}

})

})

// パーティクル
particles.forEach((p,i)=>{

p.x+=p.dx
p.y+=p.dy
p.life--

if(p.life<=0)particles.splice(i,1)

})

// HP
if(hp<=0){
alert("GAME OVER\nScore:"+score)
location.reload()
}

document.getElementById("hp").style.width=(hp/maxHP*200)+"px"

}

// 描画
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

// 星
ctx.fillStyle="white"
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,s.s,s.s)
})

// プレイヤー
ctx.fillStyle="cyan"
ctx.beginPath()
ctx.moveTo(player.x,player.y-30)
ctx.lineTo(player.x+20,player.y+20)
ctx.lineTo(player.x+8,player.y+10)
ctx.lineTo(player.x-8,player.y+10)
ctx.lineTo(player.x-20,player.y+20)
ctx.closePath()
ctx.fill()

// 弾
ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x-2,b.y,4,12)
})

// 敵
ctx.fillStyle="red"
enemies.forEach(e=>{
ctx.beginPath()
ctx.moveTo(e.x,e.y+20)
ctx.lineTo(e.x+15,e.y-10)
ctx.lineTo(e.x-15,e.y-10)
ctx.closePath()
ctx.fill()
})

// アイテム
ctx.fillStyle="cyan"
items.forEach(it=>{
ctx.beginPath()
ctx.arc(it.x,it.y,8,0,Math.PI*2)
ctx.fill()
})

// 爆発
ctx.fillStyle="orange"
particles.forEach(p=>{
ctx.fillRect(p.x,p.y,3,3)
})

}

// ループ
function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
