<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Invader Game</title>

<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
margin-top:10px;
}

canvas{
background:#111;
display:block;
margin:20px auto;
border:2px solid white;
}

</style>
</head>

<body>

<h1>👾 インベーダーゲーム</h1>
<p>← → で移動 / SPACEで攻撃</p>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<p id="score">Score: 0</p>

<script>

const canvas = document.getElementById("gameCanvas")
const ctx = canvas.getContext("2d")

let player = {
x:280,
y:360,
width:40,
height:20,
speed:6
}

let bullets=[]
let enemies=[]
let score=0
let gameRunning=true

// 敵を作る
for(let row=0; row<4; row++){
for(let col=0; col<8; col++){

enemies.push({
x:60 + col*60,
y:40 + row*40,
width:30,
height:20
})

}
}

let enemyDirection=1

let keys={}

document.addEventListener("keydown",e=>{
keys[e.code]=true

if(e.code==="Space"){
bullets.push({
x:player.x + player.width/2 -2,
y:player.y,
width:4,
height:10
})
}
})

document.addEventListener("keyup",e=>{
keys[e.code]=false
})

function update(){

if(keys["ArrowLeft"]){
player.x-=player.speed
}

if(keys["ArrowRight"]){
player.x+=player.speed
}

player.x=Math.max(0,Math.min(canvas.width-player.width,player.x))

// 弾移動
bullets.forEach((b,i)=>{
b.y-=8
if(b.y<0) bullets.splice(i,1)
})

// 敵移動
let edge=false

enemies.forEach(e=>{
e.x+=enemyDirection*1

if(e.x<0 || e.x+e.width>canvas.width){
edge=true
}
})

if(edge){
enemyDirection*=-1
enemies.forEach(e=>{
e.y+=20
})
}

// 衝突判定
bullets.forEach((b,bi)=>{
enemies.forEach((e,ei)=>{

if(
b.x<e.x+e.width &&
b.x+b.width>e.x &&
b.y<e.y+e.height &&
b.y+b.height>e.y
){
bullets.splice(bi,1)
enemies.splice(ei,1)

score+=10
document.getElementById("score").textContent="Score: "+score
}
})
})

// ゲームオーバー
enemies.forEach(e=>{
if(e.y+e.height>player.y){
alert("ゲームオーバー")
location.reload()
}
})

// 勝利
if(enemies.length===0){
alert("クリア！ Score: "+score)
location.reload()
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

// プレイヤー
ctx.fillStyle="cyan"
ctx.fillRect(player.x,player.y,player.width,player.height)

// 弾
ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,b.width,b.height)
})

// 敵
ctx.fillStyle="lime"
enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,e.width,e.height)
})

}

function gameLoop(){

if(!gameRunning) return

update()
draw()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
