<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Space Fighter</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
color:white;
text-align:center;
}

canvas{
display:block;
margin:auto;
background:#000814;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span>
<br>
HP: <span id="hp">5</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let score=0
let hp=5

let player={
x:canvas.width/2,
y:canvas.height-120,
size:30
}

let bullets=[]
let enemies=[]
let particles=[]
let stars=[]

// 星背景
for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*2
})
}

// マウス・タッチ
function movePlayer(x,y){
player.x=x
player.y=y
}

window.addEventListener("mousemove",e=>{
movePlayer(e.clientX,e.clientY)
})

window.addEventListener("touchmove",e=>{
movePlayer(e.touches[0].clientX,e.touches[0].clientY)
})

// 弾
setInterval(()=>{

bullets.push({
x:player.x,
y:player.y-20
})

},200)

// 敵生成
setInterval(()=>{

enemies.push({
x:Math.random()*canvas.width,
y:-20,
speed:2+Math.random()*2
})

},800)

// 爆発
function explode(x,y){

for(let i=0;i<15;i++){

particles.push({
x:x,
y:y,
dx:(Math.random()-0.5)*6,
dy:(Math.random()-0.5)*6,
life:30
})

}

}

// 更新
function update(){

// 星
stars.forEach(s=>{
s.y+=1
if(s.y>canvas.height) s.y=0
})

// 弾
bullets.forEach((b,i)=>{
b.y-=8
if(b.y<0) bullets.splice(i,1)
})

// 敵
enemies.forEach((e,i)=>{

e.y+=e.speed

if(e.y>canvas.height){

hp--
document.getElementById("hp").textContent=hp

enemies.splice(i,1)

if(hp<=0){
alert("GAME OVER\nScore:"+score)
location.reload()
}

}

})

// 衝突
bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(
Math.abs(b.x-e.x)<25 &&
Math.abs(b.y-e.y)<25
){

explode(e.x,e.y)

bullets.splice(bi,1)
enemies.splice(ei,1)

score+=10
document.getElementById("score").textContent=score

}

})

})

// パーティクル
particles.forEach((p,i)=>{

p.x+=p.dx
p.y+=p.dy
p.life--

if(p.life<=0){
particles.splice(i,1)
}

})

}

// 描画
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

// 星
ctx.fillStyle="white"
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,s.s,s.s)
})

// プレイヤー
ctx.fillStyle="cyan"

ctx.beginPath()
ctx.moveTo(player.x,player.y-30)
ctx.lineTo(player.x+20,player.y+20)
ctx.lineTo(player.x+8,player.y+10)
ctx.lineTo(player.x-8,player.y+10)
ctx.lineTo(player.x-20,player.y+20)
ctx.closePath()
ctx.fill()

// 弾
ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x-2,b.y,4,10)
})

// 敵
ctx.fillStyle="lime"
enemies.forEach(e=>{

ctx.beginPath()
ctx.moveTo(e.x,e.y+20)
ctx.lineTo(e.x+15,e.y-10)
ctx.lineTo(e.x-15,e.y-10)
ctx.closePath()
ctx.fill()

})

// 爆発
ctx.fillStyle="orange"
particles.forEach(p=>{
ctx.fillRect(p.x,p.y,3,3)
})

}

// ループ
function gameLoop(){

update()
draw()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
