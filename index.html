<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Jet Fighter Hardcore</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
}

canvas{
display:block;
margin:auto;
background:black;
}

#ui{
position:absolute;
top:10px;
left:15px;
font-size:18px;
}

#hpbar{
width:150px;
height:10px;
background:#333;
margin-top:5px;
}

#hp{
height:10px;
background:lime;
width:100%;
}
</style>
</head>

<body>

<div id="ui">
SCORE : <span id="score">0</span>
<div id="hpbar"><div id="hp"></div></div>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
let bullets=[]
let enemies=[]
let enemyBullets=[]
let particles=[]
let stars=[]
let boss=null

let score=0
let nextBoss=500
let difficulty=1
let enemySpawn=800

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

canvas.addEventListener("touchstart",e=>{
let x=e.touches[0].clientX
player.x=x-canvas.offsetLeft
shoot()
})

for(let i=0;i<90;i++){
stars.push({
x:Math.random()*400,
y:Math.random()*600,
speed:1+Math.random()*3
})
}

let player={
x:200,
y:520,
speed:5,
hp:100
}

function drawJet(x,y,size,color){

ctx.fillStyle=color

ctx.beginPath()
ctx.moveTo(x,y-size)
ctx.lineTo(x-size/2,y+size)
ctx.lineTo(x+size/2,y+size)
ctx.closePath()
ctx.fill()

ctx.fillRect(x-3,y-size,6,size+10)

}

function shoot(){
bullets.push({x:player.x,y:player.y-20})
}

setInterval(shoot,200)

function spawnEnemy(){

enemies.push({
x:Math.random()*360+20,
y:-20,
speed:2+Math.random()*difficulty,
vx:(Math.random()-0.5)*4,
shootTimer:Math.random()*80
})

}

setInterval(()=>{

spawnEnemy()

if(enemySpawn>300){
enemySpawn-=5
}

},enemySpawn)

function spawnBoss(){

boss={
x:200,
y:-100,
hp:20,
speed:1.2,
shootTimer:0
}

}

function explosion(x,y){

for(let i=0;i<20;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,
life:35
})

}

}

function update(){

difficulty+=0.002

if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

player.x=Math.max(20,Math.min(380,player.x))

stars.forEach(s=>{
s.y+=s.speed
if(s.y>600){s.y=0;s.x=Math.random()*400}
})

bullets.forEach(b=>b.y-=9)

enemyBullets.forEach(b=>{
b.y+=5+difficulty
b.x+=b.vx
})

enemies.forEach(e=>{

e.y+=e.speed
e.x+=e.vx

if(e.x<20||e.x>380) e.vx*=-1

e.shootTimer++

if(e.shootTimer>80){

enemyBullets.push({x:e.x,y:e.y,vx:0})
e.shootTimer=0

}

if(Math.abs(e.x-player.x)<25 && Math.abs(e.y-player.y)<25){

player.hp-=20
explosion(e.x,e.y)
e.y=700

}

})

if(boss){

boss.y+=boss.speed
boss.shootTimer++

if(boss.shootTimer>50){

enemyBullets.push({x:boss.x,y:boss.y,vx:0})
enemyBullets.push({x:boss.x,y:boss.y,vx:-2})
enemyBullets.push({x:boss.x,y:boss.y,vx:2})

boss.shootTimer=0

}

}

enemyBullets.forEach((b,bi)=>{

if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<20){

player.hp-=10
enemyBullets.splice(bi,1)

}

})

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){

explosion(e.x,e.y)

bullets.splice(bi,1)
enemies.splice(ei,1)

score+=100

}

})

if(boss){

if(Math.abs(b.x-boss.x)<45 && Math.abs(b.y-boss.y)<45){

bullets.splice(bi,1)
boss.hp--

if(boss.hp<=0){

explosion(boss.x,boss.y)

score+=1000
boss=null

}

}

}

})

particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
p.life--
})

particles=particles.filter(p=>p.life>0)
bullets=bullets.filter(b=>b.y>-10)
enemyBullets=enemyBullets.filter(b=>b.y<650)

if(score>=nextBoss && !boss){

spawnBoss()
nextBoss+=500

}

document.getElementById("score").innerText=score
document.getElementById("hp").style.width=player.hp+"%"

if(player.hp<=0){

alert("GAME OVER\nScore:"+score)
location.reload()

}

}

function draw(){

ctx.clearRect(0,0,400,600)

ctx.fillStyle="white"
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,2,2)
})

drawJet(player.x,player.y,20,"cyan")

bullets.forEach(b=>{
ctx.fillStyle="yellow"
ctx.fillRect(b.x-2,b.y-10,4,10)
})

enemyBullets.forEach(b=>{
ctx.fillStyle="red"
ctx.fillRect(b.x-2,b.y,4,8)
})

enemies.forEach(e=>{
drawJet(e.x,e.y,15,"red")
})

if(boss){

drawJet(boss.x,boss.y,50,"orange")

ctx.fillStyle="white"
ctx.fillText("BOSS HP:"+boss.hp,boss.x-40,boss.y-60)

}

particles.forEach(p=>{
ctx.fillStyle="orange"
ctx.fillRect(p.x,p.y,3,3)
})

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
