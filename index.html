<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Jet Fighter Shooting</title>
<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
color:white;
}

canvas{
display:block;
margin:auto;
background:linear-gradient(black,#001);
}

#score{
position:absolute;
top:10px;
left:20px;
font-size:22px;
}

</style>
</head>

<body>

<div id="score">SCORE : 0</div>
<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let bullets = [];
let enemies = [];
let boss = null;
let score = 0;
let nextBoss = 500;

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

let player={
x:200,
y:520,
w:40,
h:40,
speed:5
};

function drawJet(x,y,size,color){
ctx.fillStyle=color;

ctx.beginPath();
ctx.moveTo(x,y-size);
ctx.lineTo(x-size/2,y+size);
ctx.lineTo(x+size/2,y+size);
ctx.closePath();
ctx.fill();

ctx.fillRect(x-3,y-size,6,size+10);
}

function spawnEnemy(){

enemies.push({
x:Math.random()*360+20,
y:-20,
speed:2+Math.random()*2,
vx:(Math.random()-0.5)*2
});

}

setInterval(spawnEnemy,1000);

function spawnBoss(){

boss={
x:200,
y:-60,
hp:10,
speed:1.2
};

}

function update(){

if(keys["ArrowLeft"]) player.x-=player.speed;
if(keys["ArrowRight"]) player.x+=player.speed;

player.x=Math.max(20,Math.min(380,player.x));

if(keys["Space"] && bullets.length<6){

bullets.push({
x:player.x,
y:player.y-20,
speed:7
});

}

bullets.forEach(b=>b.y-=b.speed);

enemies.forEach(e=>{
e.y+=e.speed;
e.x+=e.vx;

if(e.x<20 || e.x>380) e.vx*=-1;
});

if(boss){

boss.y+=boss.speed;

}

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){

bullets.splice(bi,1);
enemies.splice(ei,1);

score+=100;

}

});

if(boss){

if(Math.abs(b.x-boss.x)<40 && Math.abs(b.y-boss.y)<40){

bullets.splice(bi,1);
boss.hp--;

if(boss.hp<=0){

score+=500;
boss=null;

}

}

}

});

if(score>=nextBoss && !boss){

spawnBoss();
nextBoss+=500;

}

bullets=bullets.filter(b=>b.y>-10);

enemies=enemies.filter(e=>e.y<650);

document.getElementById("score").innerText="SCORE : "+score;

}

function draw(){

ctx.clearRect(0,0,400,600);

drawJet(player.x,player.y,20,"cyan");

bullets.forEach(b=>{

ctx.fillStyle="yellow";
ctx.fillRect(b.x-2,b.y-10,4,10);

});

enemies.forEach(e=>{

drawJet(e.x,e.y,15,"red");

});

if(boss){

drawJet(boss.x,boss.y,35,"orange");

ctx.fillStyle="white";
ctx.fillText("BOSS HP:"+boss.hp,boss.x-40,boss.y-40);

}

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
